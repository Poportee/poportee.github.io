baseURL: "https://poportee.github.io"
languageCode: "en-us"
title: "Paul Profile"
theme: hugo-profile

# Multilingual configuration
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

languages:
  en:
    languageName: "English"
    weight: 1
    contentDir: "content"
    menu:
      main:
        - identifier: blog
          name: Blog
          title: Blog posts
          url: /blogs
          weight: 10
  fr:
    contentDir: "content/fr"
    languageName: "Français"
    weight: 2
    params:
      hero:
        intro: "Bonjour, je m'appelle"
        title: "Paul."
        subtitle: "J'aime le développement et les nouvelles technologies"
        content: "Un étudiant en dernière année d'école d'ingénieur chez IMT Mines Alès. Cherche un stage de fin d'études dans le domaine de l'intelligence artificielle et de la science des données."
        button:
          name: "CV"

      about:
        enable: true
        title: "About Me"
        image: "/images/tete.jpg"
        content: |-
          Actuellement étudiant en échange à l’École de Technologie Supérieure de Montréal, j'ai une formation d'ingénieur généraliste spécialisé en intelligence artificielle et sciences des données. Curieux, j'ai touché à divers domaines de l'IT comme le développement de jeux vidéo, l'informatique quantique ou l'ingénierie logicielle.

          Je cherche actuellement un stage de fin d'études dans le domaine de l'intelligence artificielle.
        skills:
          enable: true
          title: "Voici quelques technologies avec lesquelles j'ai récemment travaillé :"
          items:
            - "HTML"
            - "CSS"
            - "JavaScript"
            - "React"
            - "Node"
            - "Express"

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

#services:
  #googleAnalytics:
    #id: G-MEASUREMENT_ID
  #disqus:
    #shortname: your-disqus-shortname

pagination:
  pagerSize: 3

markup:
  goldmark:
    renderer:
      unsafe: true


params:    

  title: "Hugo Profile"
  description: Text about my cool site
  favicon: "/fav.png"
  useBootstrapCDN: false
  mathjax: false
  animate: true

  theme:
    # disableThemeToggle: true
    # defaultTheme: "light" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # When using hex codes for colors, quotations must be used along with the # sign
  # color:
  #   textColor: "#343a40"
  #   secondaryTextColor: "#6c757d"
  #   textLinkColor: "#007bff"
  #   backgroundColor: "#eaedf0"
  #   secondaryBackgroundColor: "#64ffda1a"
  #   primaryColor: "#007bff"
  #   secondaryColor: "#f8f9fa"

  #   darkmode:
  #     textColor: "#e4e6eb"
  #     secondaryTextColor: "#b0b3b8"
  #     textLinkColor: "#ffffff"
  #     backgroundColor: "#18191a"
  #     secondaryBackgroundColor: "#212529"
  #     primaryColor: "#ffffff"
  #     secondaryColor: "#212529"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    brandLogo: "/fav.png" 
    # showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "Paul Profile" # Brand name for the brand | default is the title variable
    disableSearch: false
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  menu:
    sections:
      - name: "About"
        id: "about"
        weight: 1      # 1er position
      - name: "Projects"
        id: "projects"
        weight: 2      # 2ème position (ton souhait)
      - name: "Experience"
        id: "experience"
        weight: 3      # 3ème position
      - name: "Education"
        id: "education"
        weight: 4

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Paul."
    subtitle: "I like development and new technologies."
    content: "A final-year engineering student looking for a final-year internship in machine learning and data science."
    image: /images/tete.jpg
    bottomImage:
      enable: true  
      roundImage: true
    button:
      enable: true
      name: "Resume"
      url: "#"
      download: true
      newPage: false
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/Poportee
        - icon: fab fa-x-linkedin
          url: https://linkedin.com/in/paulaporte-lkn/

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/tete.jpg"
    content: |-
      Currently an exchange student at the École de Technologie Supérieure in Montreal, I have a background as a generalist engineer specializing in artificial intelligence and data science. Curious by nature, I have explored various IT fields such as video game development, quantum computing, and software engineering.

      I am currently looking for a final-year internship in machine learning.
    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "HTML"
        - "CSS"
        - "JavaScript"
        - "React"
        - "Node"
        - "Express"

  # projects
  projects:
    enable: true
    # title: "Custom Name"
    items:
      - title: Hugo Profile
        content: A highly customizable and mobile first Hugo template for personal portfolio and blog.
        image: /images/projects/profile.png
        featured:
          name: Demo
          link: https://hugo-profile.netlify.app
        badges:
          - "Hugo"
          - "Bootstrap"
          - "Javascript"
        links:
          - icon: fa fa-envelope
            url: mailto:?subject=Hugo%20Profile%20Template&body=Check%20it%20out:%20https%3a%2f%2fhugo-profile.netlify.app%2fblog%2fmarkdown-syntax%2f
          - icon: fab fa-github
            url: https://github.com/gurusabarish/hugo-profile
          - icon: fab fa-twitter
            url: https://twitter.com/intent/tweet?text=Check+it+out:&url=https%3A%2F%2Fgithub.com%2Fgurusabarish%2Fhugo-profile

      - title: Image Converter
        content: A web app to convert image to pdf, png to jpg, png to jpg and png to webp without database using django.
        image: /images/projects/converter.jpg
        featured:
          name: Demo
          link: https://django-converter.herokuapp.com
        badges:
          - "Django"
          - "Bootstrap"
        links:
          - icon: fab fa-github
            url: https://github.com/gurusabarish/converter

      - title: Hugo Profile V2
        content: A clean and simple Hugo template for personal portfolio and blog.
        image: /images/projects/profile2.jpg
        featured:
          name: Demo V2
          link: https://hugo-profile-2.netlify.app
        badges:
          - "Hugo"
          - "Bootstrap"
          - "Javascript"
        links:
          - icon: fab fa-github
            url: https://github.com/gurusabarish/HugoProfileV2

  # Experience
  experience:
    enable: true
    # title: "Custom Name"
    items:
      - company: "Facebook"
        companyUrl: "https://example.com"
        jobs:
          - name: "Senior Software Developer"
            date: "Jan 2023 - present"
            content: "I am currently working as a senior software developer at [example org.](https://example.com) in San Francisco, CA. I am currently working on a project that will be used to help people find the best way to get around the city."
            info:
              content: Working as a senior software developer
            featuredItems:
              fontAwesomeIcons:
                - icon: fa-brands fa-react
                  url: https://react.dev/
                  tooltip: Example tooltip content
                - icon: fab fa-x-twitter
                  url: https://example.com
                  # tooltip: Example tooltip content
              customIcons:
                - icon: /fav.png
                  url: "https://example.com"
                  tooltip: Example tooltip content
          - name: "Software Developer"
            date: "Jan 2022 - Dec 2023"
            content: "I worked as a software developer. I worked on a project that will be used to help people find the best way to get around the city."

  # Education
  education:
    enable: true
    # title: "Custom Name"
    index: false
    items:
      - title: "Master of Business Administration"
        school:
          name: "University of California, Berkeley"
          url: "https://example.org"
        date: "2013 - 2015"
        GPA: "3.8 out of 5.0"
        content: |-
          Extracurricular Activities
            - Lorem ipsum dolor sit amet consectetur adipisicing elit.
            - Tempora esse, eaque delectus nulla quo doloribus itaque expedita alias natus optio totam maxime nihil excepturi velit a animi laborum hic similique.

  # Achievements
  achievements:
    enable: false
    # title: "Custom Name"
    items:
      - title: Google kickstart runner
        content: I solved all problems with optimal solution.
        url: https://example.com
        image: /images/achievement.jpg


  #Contact
  contact:
    enable: true
    # title: "Custom Name"
    content: My inbox is always open. Feel free to send me a question or anything else!
    btnName: Mail me
    btnLink: mailto:paulaporte0@gmail.com
    # formspree:
    #   enable: true # `contact.email` value will be ignored
    #   formId: abcdefgh # Take it from your form's endpoint, like 'https://formspree.io/f/abcdefgh'
    #   emailCaption: "Enter your email address"
    #   messageCaption: "Enter your message here"
    #   messageRows: 5

  footer:
    recentPosts:
      path: "blogs"
      count: 3
      title: Recent Posts
      enable: true
      disableFeaturedImage: false
    socialNetworks:
      github: https://github.com/Poportee
      linkedin: https://linkedin.com/in/paulaporte-lkn/

  # List pages like blogs and posts
  listPages:
    disableFeaturedImage: false

  # Single pages like blog and post
  singlePages:
    socialShare: true
    readTime:
      enable: true
      content: "min read"
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true

  # For translations
  terms:
    read: "Read"
    toc: "Table Of Contents"
    copyright: "All rights reserved"
    emailText: "Check out this site"

  datesFormat:
    article: "Jan 2, 2006"
    articleList: "Jan 2, 2006"
    articleRecent: "Jan 2, 2006"

  #customScripts: -| # You can add custom scripts which will be added before </body> tag
  #  <script type="text/javascript"><!-- any script here --></script>
