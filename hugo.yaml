baseURL: "https://poportee.github.io"
languageCode: "en-us"
title: "Paul Profile"
theme: hugo-profile

# Multilingual configuration
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

languages:
  en:
    languageName: "English"
    weight: 1
    contentDir: "content"
    menu:
      main:
        - identifier: blog
          name: Blog
          title: Blog posts
          url: /blogs
          weight: 10
  fr:
    contentDir: "content/fr"
    languageName: "Français"
    weight: 2
    params:
      hero:
        intro: "Bonjour, je m'appelle"
        title: "Paul."
        subtitle: "J'aime le développement et les nouvelles technologies"
        content: "Un étudiant en dernière année d'école d'ingénieur chez IMT Mines Alès. Cherche un stage de fin d'études dans le domaine de l'intelligence artificielle et de la science des données."
        image: /images/me_cv.jpg
        bottomImage:
          enable: true  
          roundImage: true
        button:
          enable: true
          name: "CV"
          url: "/docs/CV_Paul_Laporte_Ingenieur_IA.pdf"
          download: true
          newPage: true
        socialLinks:
          fontAwesomeIcons:
            - icon: fab fa-github
              url: https://github.com/Poportee
            - icon: fab fa-linkedin
              url: https://linkedin.com/in/paulaporte-lkn/

      about:
        enable: true
        title: "About Me"
        image: "/images/me.jpg"
        content: |-
          Actuellement étudiant en échange à l’École de Technologie Supérieure de Montréal, j'ai une formation d'ingénieur généraliste spécialisé en intelligence artificielle et sciences des données. Curieux, j'ai touché à divers domaines de l'IT comme le développement de jeux vidéo, l'informatique quantique ou l'ingénierie logicielle.

          Je cherche actuellement un stage de fin d'études dans le domaine de l'intelligence artificielle.
        skills:
          enable: true
          title: "Voici quelques technologies avec lesquelles j'ai récemment travaillé :"
          items:
            - "C"
            - "PyTorch"
            - "Cuda"
            - "Unity"
            - "OpenMP"
      
      projects:
        enable: true
        # title: "Custom Name"
        items:
          - title: ML vs Deep Learning pour la prédiction de valeurs foncières
            content: Développement d'une pipeline complète d'estimation immobilière comparant l'efficacité des arbres boostés et des architectures Transformer sur les données DVF (~13M d'entrées).
            image: /images/projects/ml_vs_dl.png
            featured:
              name: Demo
              link: https://ml-vs-dl-property-pricing-demo.streamlit.app/
            badges:
              - "PyTorch"
              - "LightGBM"
              - "Transformers"
              - "Feature Engineering"
              - "API Data Gouv"
            links:
              - icon: fab fa-github
                url: https://github.com/Poportee/ml-vs-dl-property-pricing
          - title: Analyse exploratoire et Dashboard des données PISA
            content: Nettoyage et visualisation de 500k+ lignes pour identifier les facteurs de réussite scolaire en europe.
            image: /images/projects/pisa_fr.png
            featured:
              name: Demo
              link: https://paul-laporte.shinyapps.io/Scolaire-data/#section-sciences
            badges:
              - "R"
              - "Shiny"
              - "ggplot2"
            links:
              - icon: fab fa-github
                url: https://github.com/Poportee/ml-vs-dl-property-pricing

      experience:
        enable: true
        # title: "Custom Name"
        items:
          - company: "CTU Prague"
            companyUrl: "https://www.cvut.cz/en"
            jobs:
              - name: "Stagiaire Data Scientist"
                date: "Mai 2025 - Août 2025"
                content: "Analyse des données téléphoniques tchèques et création de modèles statistiques prédictifs."
                info:
                  content: Travail de recherche en équipe pour faire une publication
                featuredItems:
                  fontAwesomeIcons:
                    - icon: fa-plus
                      url: https://react.dev/
                      tooltip: Voir le post
          - company: "Réallon"
            companyUrl: "https://www.serreponcon.com/reallon/"
            jobs:
              - name: "Développeur Power BI"
                date: "Nov 2024 - Fev 2025"
                content: Création d'un tableau de bord dynamique et automatisé pour les statistiques financières de la station de ski de Réallon."
                featuredItems:
                  fontAwesomeIcons:
                    - icon: fa-plus
                      url: https://react.dev/
                      tooltip: Voir le post 
  
      education:
        enable: true
        # title: "Custom Name"
        index: false
        items:
          - title: "Échange académique en ingénierie logicielle."
            school:
              name: "École de Technologie Supérieure, Montréal"
              url: "https://www.etsmtl.ca/"
            date: "2026"
            content: |-
              Cours pertinents :
                - Informatique quantique
                - Architecture de calcul parallèle
                - Intelligence artificielle
                - Développement de jeux vidéo
          - title: "Diplôme d'ingénieur."
            school:
              name: "IMT Mines Alès"
              url: "https://www.imt-mines-ales.fr/"
            date: "2023-2026"
            content: |-
              Programme d'ingénieur généraliste.

              Cours pertinents :
                - Apprentissage automatique avancé
                - Apprentissage profond
                - Collecte et visualisation des données
                - Statistiques et mathématiques avancées
                - Génie logiciel
                - Finance
                - Stratégie entrepreneuriale
          - title: "CPGE MPI"
            school:
              name: "Lycée Pierre de Fermat"
              url: "https://fermat.mon-ent-occitanie.fr/classes-preparatoires-aux-grandes-ecoles/"
            date: "2021-2023"
            content: |-
              Mathématiques, Physique et Infomatique théoriques.
      
      contact:
        enable: true
        # title: "Custom Name"
        content: Ma boîte de réception est toujours ouverte. N’hésitez pas à m’envoyer une question ou autre chose !
        btnName: Mail me
        btnLink: mailto:paulaporte0@gmail.com

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

#services:
